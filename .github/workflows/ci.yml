name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          # NOTE: pip cache disabled. A poisoned cache from before
          # 2026-05-13 could explain why every CI run since then fails
          # in ~80 seconds with a fresh checkout but identical local
          # behaviour. Force fresh wheels per run.

      - name: Install runtime dependencies (CPU torch)
        # Pin only what's necessary: torch+torchvision from CPU index
        # (ABI must match), and numpy<2.2 to avoid the 2.2+ wheels that
        # broke pandas's C-extension between 2026-05-12 and 2026-05-13.
        # Everything else floats with pip's resolver.
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu \
              "torch==2.5.1" "torchvision==0.20.1"
          pip install "numpy<2.2"
          pip install timm einops h5py pyhealth scikit-learn scipy pandas tensorboard

      - name: Print resolved package versions (diagnostic)
        run: pip list | grep -iE "^(torch|torchvision|numpy|pandas|scikit|sklearn|pyhealth|timm)"

      - name: Install package (editable, with dev extras)
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v
