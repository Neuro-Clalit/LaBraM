name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          # Pin torch >= 2.5 from the CPU wheel index. The earlier
          # workflow attempted `pip install numpy>=2.0` before torch,
          # but the CPU torch wheel for older torch versions pinned
          # numpy<2, downgrading it. pandas / sklearn / pyhealth
          # wheels on PyPI are compiled against numpy 2.x and then
          # hit `numpy.dtype size changed, may indicate binary
          # incompatibility` (Expected 96 from C header, got 88
          # from PyObject) at import time.
          # torch >= 2.5 supports numpy 2.x natively. torchvision
          # must come from the same index so its pinned C-extension
          # ABI matches torch (avoids
          # `operator torchvision::nms does not exist`).
          pip install --index-url https://download.pytorch.org/whl/cpu \
              "torch>=2.5" "torchvision>=0.20"
          pip install timm einops h5py pyhealth scikit-learn scipy pandas tensorboard

      - name: Print resolved package versions (diagnostic)
        # `|| true` so a no-match grep does not fail the step. Adding a
        # full `pip list` fallback so if the filtered grep returns nothing
        # we still have the package landscape in the run log.
        run: |
          echo "=== filtered pip list ==="
          pip list | grep -iE "^(torch|torchvision|numpy|pandas|scikit|sklearn|pyhealth|timm)" || true
          echo "=== full pip list ==="
          pip list
          echo "=== python version ==="
          python --version

      - name: Install package (editable, with dev extras)
        run: pip install -e ".[dev]"

      - name: Probe critical imports (diagnostic)
        # If any test file's top-level import is broken, surface it BEFORE
        # pytest collection so the traceback is unambiguous.
        run: |
          python -c "import runner_common; print('runner_common', runner_common.__file__)"
          python -c "import utils; print('utils', utils.__file__)"
          python -c "import engine_for_finetuning; print('engine_for_finetuning', engine_for_finetuning.__file__)"
          python -c "import modeling_finetune; print('modeling_finetune', modeling_finetune.__file__)"

      - name: Run pytest
        run: pytest tests/ -v --tb=long -rA
