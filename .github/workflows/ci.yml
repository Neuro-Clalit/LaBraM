name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies (CPU torch)
        # Versions pinned exactly so future upstream releases cannot break CI
        # asymmetrically with local development. CI on PR #17 (2026-05-12)
        # was green with floating versions; every CI run since 2026-05-13
        # failed in ~80s with a failure mode not readable via the MCP
        # tooling. The asymmetry implies an upstream wheel republish in
        # that window. Pin everything that we touch transitively.
        run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu \
              "torch==2.5.1" "torchvision==0.20.1"
          pip install \
              "numpy<2.2" \
              "timm==1.0.11" \
              "einops==0.8.0" \
              "h5py==3.12.1" \
              "pyhealth==1.1.6" \
              "scikit-learn==1.5.2" \
              "scipy==1.14.1" \
              "pandas==2.2.3" \
              "tensorboard==2.18.0"

      - name: Print resolved package versions (diagnostic)
        run: pip list | grep -iE "^(torch|torchvision|numpy|pandas|scikit|sklearn|pyhealth|timm)"

      - name: Install package (editable, with dev extras)
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v
