name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime dependencies (CPU torch)
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch+torchvision must come from the same index so
          # their pinned binary ABI stays in sync. timm imports
          # torchvision.models.feature_extraction transitively, so a
          # mismatched torchvision wheel causes
          # `operator torchvision::nms does not exist` at import time.
          pip install --index-url https://download.pytorch.org/whl/cpu torch torchvision
          pip install timm einops h5py pyhealth scikit-learn scipy pandas tensorboard

      - name: Install package (editable, with dev extras)
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest tests/ -v
